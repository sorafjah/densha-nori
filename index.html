<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>でんしゃにのろう</title>
<style>
  :root{
    --blue:#1a6fb5; --blue-d:#0d4f85; --green:#2e8b57;
    --bg:#eef4fa; --card:#ffffff; --ink:#22303c; --dim:#8b98a5;
    --yellow:#f5c542; --accent:#d97a3a;   /* 赤の代わりの暖色アクセント */
    --up:#3d87c9; --down:#e08a3c;         /* 上り/下りの色分け */
    --banner:#eaf3fb; --banner-b:#a9cbe8; /* 明るく他要素と馴染む案内色 */
    --banner2:#eef7f0; --banner2-b:#a9d6b6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"BIZ UDPGothic","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink);
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
    overscroll-behavior:none;
  }
  ruby rt{font-size:0.45em; color:inherit; opacity:.85;}
  #app{max-width:800px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}

  /* header */
  #hdr{
    background:var(--blue-d); color:#fff; padding:8px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    position:sticky; top:0; z-index:5;
  }
  #hdr .clock{font-size:1.5rem; font-weight:bold; letter-spacing:1px; font-variant-numeric:tabular-nums;}
  #hdr .date{font-size:.95rem;}
  #hdr .where{font-size:.95rem; text-align:right;}

  .screen{display:none; flex:1; padding:14px; flex-direction:column; gap:12px;}
  .screen.on{display:flex;}

  .card{background:var(--card); border-radius:14px; padding:14px; box-shadow:0 2px 6px rgba(20,40,70,.08);}
  h1{font-size:1.5rem; margin:.2em 0; text-align:center;}
  h2{font-size:1.15rem; margin:.2em 0;}
  .center{text-align:center;}
  .note{color:var(--dim); font-size:.9rem;}

  button{
    font-family:inherit; font-size:1.05rem; border:none; border-radius:12px;
    min-height:48px; min-width:48px; padding:10px 18px; cursor:pointer;
    background:var(--blue); color:#fff; font-weight:bold;
    box-shadow:0 3px 0 rgba(0,0,0,.18);
  }
  button:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.18);}
  button:disabled{background:#b9c4ce; box-shadow:none; color:#eef;}
  button.big{font-size:1.3rem; padding:16px 24px; width:100%;}
  button.ghost{background:#e7eef5; color:var(--blue-d);}
  button.green{background:var(--green);}
  button.accent{background:var(--accent);}

  /* banner（黒・赤をやめ、明るく馴染む配色に統一） */
  .banner{
    background:var(--banner); border:2px solid var(--banner-b); border-radius:12px;
    padding:10px 12px; font-size:1.05rem; color:var(--ink);
  }
  .banner.alt{background:var(--banner2); border-color:var(--banner2-b);}

  /* route map（リアルモード：時刻表の上に常時表示） */
  #linemap-wrap{display:none;}
  #linemap-wrap.show{display:block;}
  #linemap{position:relative; padding:22px 6px 8px;}
  #linemap .lm-line{position:absolute; left:4%; right:4%; top:30px; height:6px; background:var(--blue); border-radius:3px;}
  #linemap .lm-row{display:flex; align-items:flex-start; justify-content:space-between;}
  .lm-sta{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:4px; width:13%;}
  .lm-sta .dot{width:16px; height:16px; border-radius:50%; background:#fff; border:4px solid var(--blue);}
  .lm-sta.expstop .dot{border-color:var(--accent); background:#fdf1e6;}
  .lm-sta .nm{font-size:.58rem; text-align:center; line-height:1.15; word-break:keep-all;}
  .lm-sta.here .dot{background:var(--yellow); box-shadow:0 0 0 5px rgba(245,197,66,.45);}
  .lm-sta.dest .nm{font-weight:bold; color:var(--blue-d);}
  .lm-sta.dest .dot{box-shadow:0 0 0 4px rgba(217,122,58,.35);}
  .lm-legend{display:flex; gap:12px; flex-wrap:wrap; font-size:.85rem; padding-top:8px; align-items:center;}
  .lm-legend .lg{display:inline-flex; align-items:center; gap:5px;}
  .lm-legend .sw{width:16px;height:16px;border-radius:50%;background:#fff;border:4px solid var(--blue);}
  .lm-legend .sw.exp{border-color:var(--accent); background:#fdf1e6;}
  .lm-legend .sw.hereex{background:var(--yellow);}

  /* timetable */
  .tt-tabs{display:flex; gap:8px;}
  .tt-tabs button{flex:1; background:#dfe8f0; color:var(--ink); box-shadow:none;}
  .tt-tabs button.act{background:var(--blue); color:#fff;}
  .tt-dual{display:flex; gap:12px; flex-wrap:wrap;}
  .tt-daycol{flex:1; min-width:260px;}
  .tt-daycol h4{
    margin:0 0 6px; background:#dfe8f0; color:var(--blue-d); padding:6px 10px;
    border-radius:8px; font-size:.95rem; text-align:center;
  }
  .tt-dir{margin-top:10px;}
  .tt-dir h3{
    margin:0; padding:8px 10px; border-radius:10px 10px 0 0; font-size:1.05rem; color:#fff;
  }
  .tt-dir.up h3{background:var(--up);}
  .tt-dir.down h3{background:var(--down);}
  .tt-grid{border:2px solid #cdd8e2; border-top:none; border-radius:0 0 10px 10px; overflow:hidden; background:#fff;}
  .tt-row{display:flex; border-bottom:1px solid #dde5ec;}
  .tt-row:last-child{border-bottom:none;}
  .tt-hour{
    width:44px; flex:0 0 44px; background:#f0f5fa; display:flex; align-items:center; justify-content:center;
    font-weight:bold; font-size:1rem; border-right:2px solid #cdd8e2; font-variant-numeric:tabular-nums;
  }
  .tt-mins{display:flex; flex-wrap:wrap; gap:6px; padding:6px 8px; flex:1;}
  .tt-cell{
    min-width:46px; min-height:44px; padding:4px 6px; border-radius:8px;
    background:#f2f6fa; color:var(--ink); font-weight:bold; font-size:1rem;
    box-shadow:inset 0 0 0 1px #ccd7e1; font-variant-numeric:tabular-nums;
    display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.1;
  }
  .tt-cell .k{font-size:.58rem; font-weight:normal;}
  .tt-cell.exp{background:#fdf1e6; color:#a3591a; box-shadow:inset 0 0 0 2px var(--accent);}
  .tt-cell.past{opacity:.35;}
  .tt-legend{display:flex; gap:14px; padding:8px 4px; font-size:.9rem; align-items:center; flex-wrap:wrap;}
  .lg{display:inline-flex; align-items:center; gap:5px;}
  .lg .sw{width:20px;height:20px;border-radius:5px; background:#f2f6fa; box-shadow:inset 0 0 0 1px #ccd7e1;}
  .lg .sw.exp{background:#fdf1e6; box-shadow:inset 0 0 0 2px var(--accent);}

  /* platform：上り/下りで線路を分ける */
  #plat-scene{
    position:relative; border-radius:12px; overflow:hidden;
    background:#bfe0f7;
  }
  .plat-track{position:relative; height:110px; background:linear-gradient(#bfe0f7 0 40%, #9aa7b1 40% 58%, #e8e2d5 58% 100%);}
  .plat-track + .plat-track{border-top:3px dashed #fff;}
  .plat-track .tk-label{position:absolute; top:4px; left:8px; font-size:.8rem; background:#fff; border-radius:6px; padding:2px 8px; z-index:2;}
  .plat-track .tk-line{position:absolute; left:0; right:0; top:46%; height:5px; background:#555;}
  .plat-track .tk-train{position:absolute; top:6%; left:110%; width:230px; height:56px; transition:left 1.1s ease-out; display:flex; gap:3px;}
  .plat-track .tk-train.up{flex-direction:row-reverse;}
  .tk-train .carbody{flex:1; background:var(--blue); border-radius:10px; position:relative; border-bottom:8px solid #2a5d8c;}
  .plat-track.dir-up .tk-train .carbody{background:var(--up); border-bottom-color:#2a5d8c;}
  .plat-track.dir-down .tk-train .carbody{background:var(--down); border-bottom-color:#a15b1f;}
  .tk-train.exp .carbody{box-shadow:inset 0 0 0 3px #a3591a;}
  .tk-train .carbody::before{content:""; position:absolute; left:8%; right:8%; top:18%; height:38%; background:#dff0fb; border-radius:5px;}
  .tk-label-run{position:absolute; top:62%; left:0; right:0; text-align:center; font-size:.85rem; font-weight:bold; color:#123; text-shadow:0 1px 0 #fff;}
  #plat-mark{padding:6px 10px; font-size:.9rem; background:#fff; text-align:center;}
  .ff-indicator{
    padding:6px 10px; font-size:.9rem; text-align:center; background:#fff6d8; color:#8a6d1a;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .ff-indicator .pip{background:#8a6d1a;}
  .btnrow{display:flex; gap:10px; flex-wrap:wrap;}
  .btnrow button{flex:1;}
  .pip{display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--yellow); margin:0 2px; animation:pipfade 1s ease-in-out infinite;}
  @keyframes pipfade{0%,100%{opacity:.3;}50%{opacity:1;}}

  /* ride */
  #route{display:flex; align-items:center; justify-content:space-between; padding:26px 6px 6px; position:relative;}
  #route .rline{position:absolute; left:4%; right:4%; top:36px; height:6px; background:var(--blue); border-radius:3px;}
  .sta{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:4px; width:13%;}
  .sta .dot{width:18px; height:18px; border-radius:50%; background:#fff; border:4px solid var(--blue);}
  .sta.expstop .dot{border-color:var(--accent);}
  .sta .nm{font-size:.62rem; text-align:center; line-height:1.15; word-break:keep-all;}
  .sta.target .dot{background:var(--yellow);}
  .sta.here .dot{box-shadow:0 0 0 5px rgba(245,197,66,.55);}
  #ride-train{position:absolute; top:-2px; font-size:1.7rem; transition:left .9s ease; z-index:2; transform:translateX(-50%);}
  #announce{
    min-height:74px; background:var(--banner); border:2px solid var(--banner-b); color:var(--ink);
    border-radius:12px; display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:1.25rem; padding:10px; line-height:1.5;
  }

  /* errand */
  #errand-art{font-size:4rem; text-align:center; padding:14px 0;}
  .progress{height:14px; background:#e2eaf1; border-radius:7px; overflow:hidden;}
  .progress i{display:block; height:100%; width:0%; background:var(--green); transition:width .3s linear;}

  /* result */
  .rtable{width:100%; border-collapse:collapse; font-size:1.05rem;}
  .rtable td{padding:8px 6px; border-bottom:1px solid #e2eaf1;}
  .rtable td:last-child{text-align:right; font-weight:bold; font-variant-numeric:tabular-nums;}
  #title-badge{
    text-align:center; font-size:1.5rem; font-weight:bold; color:var(--blue-d);
    background:#fff6d8; border:3px solid var(--yellow); border-radius:14px; padding:14px;
  }

  /* modal */
  #modal-bg{
    position:fixed; inset:0; background:rgba(10,25,45,.5); display:none;
    align-items:center; justify-content:center; z-index:50; padding:18px;
  }
  #modal-bg.on{display:flex;}
  #modal{
    background:#fff; border-radius:16px; padding:20px; max-width:460px; width:100%;
    display:flex; flex-direction:column; gap:14px; text-align:center;
  }
  #modal-text{font-size:1.15rem; line-height:1.7;}
  #modal-icon{font-size:2.6rem;}
  .modebtns{display:flex; flex-direction:column; gap:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="clock" id="hdr-clock">--:--</div>
    <div class="date" id="hdr-date"></div>
    <div class="where" id="hdr-where"></div>
  </div>

  <!-- モード選択 -->
  <div class="screen on" id="s-mode">
    <h1>🚃 でんしゃにのろう</h1>
    <p class="center note">ひとりで でんしゃに のる れんしゅうを しよう</p>
    <div class="card modebtns">
      <button class="big" id="btn-mode-normal">ふつうモード<br><span style="font-size:.85rem;font-weight:normal">かくえきていしゃ だけ。ゆっくり れんしゅう</span></button>
      <button class="big accent" id="btn-mode-real">リアルモード<br><span style="font-size:.85rem;font-weight:normal"><ruby>急行<rt>きゅうこう</rt></ruby>や <ruby>方向<rt>ほうこう</rt></ruby>も じぶんで えらぶ</span></button>
    </div>
  </div>

  <!-- 平日/土日選択（ふつうモード） -->
  <div class="screen" id="s-day">
    <h2 class="center">きょうは どっち？</h2>
    <div class="card modebtns">
      <button class="big" id="btn-day-weekday"><ruby>平日<rt>へいじつ</rt></ruby>（<ruby>月<rt>げつ</rt></ruby>〜<ruby>金<rt>きん</rt></ruby>）</button>
      <button class="big green" id="btn-day-weekend"><ruby>土日<rt>どにち</rt></ruby>（<ruby>土<rt>ど</rt></ruby>・<ruby>日<rt>にち</rt></ruby>）</button>
    </div>
  </div>

  <!-- 時刻表 -->
  <div class="screen" id="s-tt">
    <div class="banner" id="tt-banner"></div>
    <div class="card" id="linemap-wrap">
      <h2 style="margin-top:0">🗺️ <ruby>路線図<rt>ろせんず</rt></ruby></h2>
      <div id="linemap"></div>
      <div class="lm-legend" id="lm-legend"></div>
    </div>
    <div class="card">
      <div class="tt-tabs" id="tt-tabs">
        <button id="tab-weekday">📅 <ruby>平日<rt>へいじつ</rt></ruby></button>
        <button id="tab-weekend">🌞 <ruby>土日<rt>どにち</rt></ruby></button>
      </div>
      <div class="tt-legend" id="tt-legend"></div>
      <div id="tt-body"></div>
    </div>
    <p class="note center">のりたい <ruby>時刻<rt>じこく</rt></ruby>を タップしてね</p>
    <div class="btnrow" id="tt-backrow" style="display:none">
      <button class="ghost" id="btn-back-platform">◀ もとの ホームに もどる</button>
    </div>
  </div>

  <!-- ホーム -->
  <div class="screen" id="s-platform">
    <div class="banner alt" id="plat-banner"></div>
    <div id="plat-scene">
      <div class="plat-track" id="track-up">
        <div class="tk-label">⬅️ <ruby>上<rt>のぼ</rt></ruby>り <span id="up-dest-label"></span></div>
        <div class="tk-line"></div>
        <div class="tk-train up" id="train-up"><div class="carbody"></div><div class="carbody"></div><div class="carbody"></div></div>
        <div class="tk-label-run" id="train-up-label"></div>
      </div>
      <div class="plat-track" id="track-down">
        <div class="tk-label">➡️ <ruby>下<rt>くだ</rt></ruby>り <span id="down-dest-label"></span></div>
        <div class="tk-line"></div>
        <div class="tk-train down" id="train-down"><div class="carbody"></div><div class="carbody"></div><div class="carbody"></div></div>
        <div class="tk-label-run" id="train-down-label"></div>
      </div>
      <div id="plat-mark"></div>
      <div id="ff-indicator" class="ff-indicator" style="display:none">⏩ <ruby>早送<rt>はやおく</rt></ruby>り<ruby>中<rt>ちゅう</rt></ruby><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
    </div>
    <div class="btnrow">
      <button class="big green" id="btn-board" disabled>🚪 のる</button>
    </div>
    <div class="btnrow">
      <button class="ghost" id="btn-ff">⏩ <ruby>早送<rt>はやおく</rt></ruby>り</button>
      <button class="ghost" id="btn-open-tt">📋 <ruby>時刻表<rt>じこくひょう</rt></ruby>を<ruby>見<rt>み</rt></ruby>る</button>
    </div>
  </div>

  <!-- 乗車中 -->
  <div class="screen" id="s-ride">
    <div class="banner alt" id="ride-banner"></div>
    <div class="card">
      <div id="route"></div>
    </div>
    <div id="announce"></div>
    <div class="btnrow">
      <button class="big accent" id="btn-alight" disabled>🚪 おりる</button>
    </div>
  </div>

  <!-- 用事 -->
  <div class="screen" id="s-errand">
    <div class="banner" id="errand-banner"></div>
    <div class="card">
      <div id="errand-art">🛍️</div>
      <div class="progress"><i id="errand-bar"></i></div>
      <p class="center note" id="errand-note">ようじを すませています…</p>
    </div>
    <div class="btnrow">
      <button class="big" id="btn-errand-done" style="display:none">✅ ようじ おわり！<ruby>駅<rt>えき</rt></ruby>へ もどる</button>
    </div>
  </div>

  <!-- リザルト -->
  <div class="screen" id="s-result">
    <h1>🏠 おうちに つきました！</h1>
    <div id="title-badge"></div>
    <div class="card">
      <table class="rtable" id="result-table"></table>
    </div>
    <button class="big" id="btn-again">🔁 もういちど あそぶ</button>
  </div>
</div>

<!-- モーダル -->
<div id="modal-bg">
  <div id="modal">
    <div id="modal-icon"></div>
    <div id="modal-text"></div>
    <button class="big" id="modal-ok">OK</button>
    <button class="ghost" id="modal-no" style="display:none">やめる</button>
  </div>
</div>

<script>
"use strict";
/* ============ 基本ユーティリティ ============ */
const P = new URLSearchParams(location.search);
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SEED = parseInt(P.get('seed')||String(Date.now()%1e9),10);
const rng = mulberry32(SEED);
let TS = Math.max(0.1, parseFloat(P.get('ts')||'1'));   // テスト用倍速
window.__setSpeed = v => { TS = v; };

const $ = s => document.querySelector(s);
function fmt(min){min=Math.floor(min);const h=Math.floor(min/60),m=min%60;return h+':'+String(m).padStart(2,'0');}

/* ============ 路線データ ============ */
const STATIONS = [
  {n:'港中央', k:'みなとちゅうおう'},
  {n:'花見川', k:'はなみがわ'},
  {n:'青葉台', k:'あおばだい'},
  {n:'桜が丘', k:'さくらがおか'},   // 自宅の最寄り駅
  {n:'富士見町', k:'ふじみちょう'},
  {n:'緑山', k:'みどりやま'},
  {n:'高原口', k:'こうげんぐち'},
];
const HOME = 3;
const EXP_STOPS = new Set([0,2,3,5,6]);          // 急行停車駅（1,4は通過）
const DIR_NAME = {up:'上り', up_k:'のぼり', down:'下り', down_k:'くだり'};
const DIR_DEST = {up:0, down:6};                 // 行き先の終点
function rb(i){const s=STATIONS[i];return `<ruby>${s.n}<rt>${s.k}</rt></ruby>`;}
function dirRb(dir){return `<ruby>${DIR_NAME[dir]}<rt>${DIR_NAME[dir+'_k']}</rt></ruby>`;}
function typeRb(t){return t==='exp' ? '<ruby>急行<rt>きゅうこう</rt></ruby>' : '<ruby>各停<rt>かくてい</rt></ruby>';}

/* 時刻表パターン：10:00〜16:00、1時間最大5本、時間帯で緩急をつける
   ラッシュ想定なしのお出かけ利用なので、
   10-11時台・15-16時台は本数少なめ（2-3本）、12-14時台は多め（4-5本）にする */
const HOURS = [10,11,12,13,14,15];  // 各時0分〜次時0分の枠。16:xxは無し（16:00で最終想定）

// 分割パターン定義：時間帯ごとの本数を変える（種別込みで最大5本/時）
const PAT = {
  weekday:{
    up:{
      local:{10:[6,36],       11:[10,30,50],  12:[5,20,35,50], 13:[8,24,40,56], 14:[12,32,52],  15:[15,45]},
      exp:  {10:[],           11:[],          12:[42],         13:[],          14:[],          15:[]},
    },
    down:{
      local:{10:[9,39],       11:[13,33,53],  12:[3,18,33,48], 13:[11,27,43,59],14:[16,36,56],  15:[19,49]},
      exp:  {10:[],           11:[],          12:[],           13:[],          14:[44],        15:[]},
    },
  },
  weekend:{
    up:{
      local:{10:[20,50],      11:[25,55],     12:[10,30,50],   13:[10,40],     14:[15,45],     15:[30]},
      exp:  {10:[],           11:[],          12:[],           13:[25],        14:[],          15:[]},
    },
    down:{
      local:{10:[5,35],       11:[15,45],     12:[0,25,50],    13:[20,50],     14:[5,35],      15:[10,40]},
      exp:  {10:[],           11:[],          12:[40],         13:[],          14:[],          15:[]},
    },
  },
};
function fullSchedule(day){
  const out=[];
  for(const dir of ['up','down']) for(const type of ['local','exp'])
    for(const h of HOURS) for(const m of (PAT[day][dir][type][h]||[])) out.push({time:h*60+m, dir, type});
  out.sort((a,b)=>a.time-b.time);
  return out;
}
const DAY_START=10*60, DAY_END=16*60;

/* ============ ゲーム状態 ============ */
const G = {
  state:'MODE', mode:null, dayType:null, clock:0, startClock:0,
  curSta:HOME, dest:null,

function initRandom(){

  G.dest = P.has('dest') ? parseInt(P.get('dest'),10) : cands[Math.floor(rng()*cands.length)];
  G.clock = P.has('start') ? parseInt(P.get('start'),10) : DAY_START + Math.floor(rng()*180); // 10:00〜13:00
  G.startClock = G.clock;
}

/* ============ 音（Web Audio） ============ */
let AC=null;
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function tone(f,dur,type='sine',vol=.15,when=0){
  const c=ac(); if(!c) return;
  try{
    const o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(vol,c.currentTime+when);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+when+dur);
    o.connect(g);g.connect(c.destination);
    o.start(c.currentTime+when);o.stop(c.currentTime+when+dur+.05);
  }catch(e){}
}
const sndBell = ()=>{for(let i=0;i<6;i++)tone(880,0.12,'square',.08,i*0.15);};      // 発車ベル
const sndDoor = ()=>{tone(660,0.15,'sine',.12);tone(880,0.2,'sine',.1,0.15);};       // 乗降音
const sndChime= ()=>{tone(784,0.25,'sine',.12);tone(988,0.3,'sine',.12,0.22);};      // アナウンスチャイム
const sndSoft = ()=>{tone(440,0.3,'sine',.1);tone(392,0.4,'sine',.1,0.25);};          // 優しい通知
const sndGood = ()=>{tone(523,0.15,'sine',.12);tone(659,0.15,'sine',.12,0.15);tone(784,0.3,'sine',.12,0.3);};
const sndPip  = ()=>{tone(1046,0.06,'square',.05);};                                  // 早送りピッ

function ttDirsAvailable(dir){
  return !((dir==='up'&&G.curSta===0)||(dir==='down'&&G.curSta===6));

function buildDirGridHTML(day, dir){
  if(!ttDirsAvailable(dir)) return '';
  const showExp = G.mode==='real';
  let html = `<div class="tt-dir ${dir}"><h3>${dirRb(dir)}　${rb(DIR_DEST[dir])}ゆき</h3><div class="tt-grid">`;
  for(const h of HOURS){
    const cells=[];
    for(const type of (showExp?['local','exp']:['local'])){
      for(const m of (PAT[day][dir][type][h]||[])) cells.push({m,type});
    }
    cells.sort((a,b)=>a.m-b.m);
    if(!cells.length) continue;
    html += `<div class="tt-row"><div class="tt-hour">${h}</div><div class="tt-mins">`;
    for(const c of cells){
      const t=h*60+c.m;
      const past = t < G.clock+1;
      html += `<button class="tt-cell ${c.type==='exp'?'exp':''} ${past?'past':''}" `+
        `data-day="${day}" data-time="${t}" data-dir="${dir}" data-type="${c.type}">`+
        `${String(c.m).padStart(2,'0')}${c.type==='exp'?'<span class="k">急</span>':''}</button>`;
    }
    html += `</div></div>`;
  }
  html += `</div></div>`;
  return html;
}

function pickCell(el){
  const t=+el.dataset.time, dir=el.dataset.dir, type=el.dataset.type, day=el.dataset.day;
  if(t < G.clock+1){
    sndSoft();
    modal('past','⏰',`その でんしゃは もう <ruby>行<rt>い</rt></ruby>ってしまいました。<br>いまの <ruby>時刻<rt>じこく</rt></ruby>（<b>${fmt(G.clock)}</b>）より あとの <ruby>時刻<rt>じこく</rt></ruby>を えらぼう。`,'わかった');
    return;
  }
  // その曜日欄で、今より前にあり・かつこの電車より早く来る「乗れる電車」があるか確認
  let earlierNote='';
  if(day===G.dayType){
    const earlier=fullSchedule(G.dayType).filter(x=>x.dir===dir && x.time>=G.clock+1 && x.time<t &&
      !(x.type==='exp' && !EXP_STOPS.has(G.curSta)));
    if(earlier.length){
      earlierNote = `<br><span style="color:#a3591a">💡 それより <ruby>早<rt>はや</rt></ruby>く <b>${fmt(earlier[0].time)}</b> の でんしゃも あるよ。</span>`;
    }
  }
  modal('confirm','🚃',
    `<b>${fmt(t)}</b> の ${dirRb(dir)} ${typeRb(type)}<br>（${rb(DIR_DEST[dir])}ゆき）に のりますか？${earlierNote}`,
    'のる！', ()=>{
      const exists = day===G.dayType && fullSchedule(G.dayType).some(x=>x.time===t&&x.dir===dir&&x.type===type);
      G.planned={time:t, dir, type, exists, handled:false};
      showPlatform({keepTrains:false});
    }, 'やめる');
}

function platformEventsForDir(dir){
  if(G.mode==='normal' && dir!==needDir()) return []; // ふつうモードは進行方向のみを対象にする
  let all=fullSchedule(G.dayType).filter(t=>t.dir===dir);
  if(G.mode==='normal') all=all.filter(t=>t.type==='local');
  if(!ttDirsAvailable(dir)) return [];
  return all.map(t=>({...t, passing: t.type==='exp'&&!EXP_STOPS.has(G.curSta)}));
}
function nextEventFor(dir){
  return platformEventsForDir(dir).find(t=>t.time>=G.clock) || null;
}
function matchesPlanned(t){
  const p=G.planned;
  return p && t.time===p.time && t.dir===p.dir && t.type===p.type;
}

function tickPlatform(dt){
  // 大きなdt（画面遷移などで実時間が経過した場合）は小刻みに分割して処理する
  const STEP=250;
  while(dt>0){
    const step=Math.min(dt, STEP);
    tickPlatformStep(step);
    dt-=step;
    if(G.modalOpen) return; // モーダルが開いたら以降の分割処理は中断
  }
}
function tickPlatformStep(dt){
  const pf=G.platform;
  // ピッピッピ演出（待機中、実時間で一定間隔に鳴らす）
  if(!pf.up && !pf.down){
    pf._pipAcc=(pf._pipAcc||0)+dt;
    if(pf._pipAcc>420){ pf._pipAcc=0; sndPip(); }
  }
  let arrivedSomething=false;
  for(const dir of ['up','down']){
    const key=dir; // pf.up / pf.down
    if(pf[key]){
      pf[key+'Timer']-=dt;
      if(pf[key+'Timer']<=0) departTrain(dir);
      continue;
    }
    if(!ttDirsAvailable(dir)) continue;
    const nx=nextEventFor(dir);
    if(nx && G.clock >= nx.time-0.3){
      arriveTrain(dir, nx);
      arrivedSomething=true;
    }
  }
  if(arrivedSomething) return;

  const cands=['up','down'].filter(ttDirsAvailable).map(nextEventFor).filter(Boolean);
  const nxTime = cands.length ? Math.min(...cands.map(t=>t.time)) : null;
  const p=G.planned;
  // 「選んだ電車が実は存在しない」ケースも早送りの目標に含める（曜日欄違いの通知を飛び越えないため）
  let clampTime = nxTime;
  if(p && !p.exists && !p.handled){
    clampTime = clampTime!==null ? Math.min(clampTime, p.time+0.5) : p.time+0.5;
  }

  const NORMAL_SPEED = 20/60;   // 通常速度：実1秒 = ゲーム内20秒
  const MAX_WAIT_MS = 5000;     // 待ち始めてから実時間5秒以内に必ず到着させる

  if(clampTime!==null && clampTime > G.clock){
    if(pf.ffTarget !== clampTime){
      // 待ち始めの時点で、到着までの所要時間（実時間）を一度だけ確定する
      pf.ffTarget = clampTime;
      pf.ffStartClock = G.clock;
      pf.ffElapsed = 0;
      const remainMin = clampTime - G.clock;
      const normalMsNeeded = remainMin / NORMAL_SPEED * 1000;
      pf.ffDuration = Math.min(normalMsNeeded, MAX_WAIT_MS);
      pf.fastForward = normalMsNeeded > MAX_WAIT_MS;
    }
    pf.ffElapsed += dt;
    const progress = pf.ffDuration>0 ? Math.min(1, pf.ffElapsed / pf.ffDuration) : 1;
    G.clock = pf.ffStartClock + (pf.ffTarget - pf.ffStartClock) * progress;
  } else {
    pf.fastForward = false; pf.ffTarget=null;
  }
  // 次の電車の到着直前でクランプ（電車自体の到着処理は次のstepで行う）
  if(nxTime!==null && G.clock >= nxTime-0.3) G.clock = nxTime-0.3;
  $('#ff-indicator').style.display = pf.fastForward ? 'flex' : 'none';

  // 「選んだ電車が実は存在しない」（平日/土日の欄を読み違えた）
  if(p && !p.exists && !p.handled && G.clock > p.time+0.5){
    p.handled=true; sndSoft();
    modal('wrongTab','🤔',
      `あれ？ でんしゃが <ruby>来<rt>き</rt></ruby>ません…<br>` +
      `きょうは <b>${G.dayType==='weekday'?'<ruby>平日<rt>へいじつ</rt></ruby>':'<ruby>土日<rt>どにち</rt></ruby>'}</b>です。<br>` +
      `<ruby>時刻表<rt>じこくひょう</rt></ruby>の <ruby>欄<rt>らん</rt></ruby>を もういちど たしかめよう！`,
      '時刻表を見る', ()=>showTT({isRescue:false, fromPlatform:true}));
  }
}
$('#btn-ff').addEventListener('click',()=>{
  const pf=G.platform;
  if(pf.up || pf.down) return; // 電車が既にホームにいる時は無効
  const cands=['up','down'].filter(ttDirsAvailable).map(nextEventFor).filter(Boolean);
  const nxTime = cands.length ? Math.min(...cands.map(t=>t.time)) : null;
  const p=G.planned;
  let clampTime = nxTime;
  if(p && !p.exists && !p.handled){
    clampTime = clampTime!==null ? Math.min(clampTime, p.time+0.5) : p.time+0.5;
  }
  if(clampTime===null) return;
  pf.ffTarget=null; pf.fastForward=false;
  G.clock = (nxTime!==null && clampTime===nxTime) ? nxTime-0.3 : clampTime;
});
function arriveTrain(dir, t){
  G.platform.fastForward=false; G.platform.ffTarget=null;
  $('#ff-indicator').style.display='none';
  G.platform[dir]=t;
  G.platform[dir+'Timer'] = t.passing ? 2600 : 6500;
  const tr=$('#train-'+dir);
  tr.classList.toggle('exp', t.type==='exp');
  // 上りは右側から、下りは左側から必ず来るように、開始位置を強制してからアニメーションする
  const startPos = dir==='up' ? '110%' : '-60%';
  tr.style.transition='none';
  tr.style.left = startPos;
  tr.style.transform='';
  void tr.offsetWidth; // 強制リフロー
  tr.style.transition='';
  const goalLeft = t.passing ? (dir==='up'?'-60%':'110%') : '50%';
  tr.style.left = goalLeft;
  tr.style.transform = t.passing ? '' : 'translateX(-50%)';
  $('#train-'+dir+'-label').innerHTML = t.passing
    ? `⚠️ ${typeRb('exp')}が <ruby>通過<rt>つうか</rt></ruby>します（のれません）`
    : `${fmt(t.time)}　${typeRb(t.type)}　${rb(DIR_DEST[dir])}ゆき`;
  if(!t.passing){
    G.platform.boardable=t;
    $('#btn-board').disabled=false;
    sndBell();
  } else {
    sndChime();
  }
}
function departTrain(dir){
  const t=G.platform[dir];
  if(!t) return;
  G.platform[dir]=null;
  const tr=$('#train-'+dir);
  // 到着したのと同じ方向へ、さらに進んで抜けていく（上り→左へ、下り→右へ）
  tr.style.left = dir==='up' ? '-60%' : '110%';
  tr.style.transform='';
  $('#train-'+dir+'-label').textContent='';
  if(G.platform.boardable===t){ G.platform.boardable=null; $('#btn-board').disabled=true; }
  G.clock=Math.max(G.clock, t.time+0.3);
  if(!t.passing && matchesPlanned(t)){
    // 乗り過ごし
    G.counters.miss++;
    G.planned.handled=true;
    sndSoft();
    modal('miss','💨',
      `あっ、でんしゃが <ruby>行<rt>い</rt></ruby>ってしまった…<br>` +
      `だいじょうぶ、もう<ruby>一度<rt>いちど</rt></ruby> やってみよう！<br>` +
      `<ruby>時刻表<rt>じこくひょう</rt></ruby>で <ruby>次<rt>つぎ</rt></ruby>の でんしゃを えらぼう。`,
      '時刻表を見る', ()=>showTT({isRescue:false, fromPlatform:true}));
  }
}

/* ============ 乗車中 ============ */
function startRide(tr){
  G.state='RIDE';
  G.platform[tr.dir]=null;
  G.platform.boardable=null;
  G.ride={
    dir:tr.dir, type:tr.type, pos:G.curSta, from:G.curSta,
    phase:'depart', t:1400, dirChecked:false,
    flags:{over:false, type:false, dir:false},
    pipAcc:0,
  };
  $('#ride-banner').innerHTML =
    `${dirRb(tr.dir)} ${typeRb(tr.type)}（${rb(DIR_DEST[tr.dir])}ゆき）に <ruby>乗車中<rt>じょうしゃちゅう</rt></ruby><br>` +
    `🎯 ${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>で 「おりる」を タップしよう`;
  renderRoute();
  setAnnounce(`🔔 まもなく <ruby>発車<rt>はっしゃ</rt></ruby>します`);
  $('#btn-alight').disabled=true;
  show('s-ride');
  updateHdr();
}
function renderRoute(){
  const r=G.ride;
  let html='<div class="rline"></div>';
  for(let i=0;i<STATIONS.length;i++){
    html+=`<div class="sta ${EXP_STOPS.has(i)?'expstop':''} ${i===G.trip.to?'target':''} ${i===r.pos?'here':''}" data-idx="${i}">`+
      `<div class="dot"></div><div class="nm">${rb(i)}</div></div>`;
  }
  html+=`<div id="ride-train">🚃</div>`;
  $('#route').innerHTML=html;
  positionRideTrain();
}
function positionRideTrain(){
  const r=G.ride; if(!r) return;
  const dotEl = document.querySelector(`.sta[data-idx="${r.pos}"] .dot`);
  const routeEl = $('#route');
  const trainEl = $('#ride-train');
  if(!dotEl || !routeEl || !trainEl) return;
  const dotRect = dotEl.getBoundingClientRect();
  const routeRect = routeEl.getBoundingClientRect();
  const centerX = dotRect.left + dotRect.width/2 - routeRect.left;
  trainEl.style.left = centerX + 'px';
}
window.addEventListener('resize', ()=>{ if(G.state==='RIDE') positionRideTrain(); });
function setAnnounce(html){ $('#announce').innerHTML=html; }

function tickRide(dt){
  const r=G.ride; if(!r) return;
  // 移動中はピッピッピで速く進める演出
  if(r.phase==='moving'){
    r.pipAcc=(r.pipAcc||0)+dt;
    if(r.pipAcc>380){ r.pipAcc=0; sndPip(); }
  }
  r.t-=dt;
  if(r.t>0) return;
  const d = r.dir==='up' ? -1 : 1;
  if(r.phase==='depart'||r.phase==='stop'||r.phase==='pass'){
    // 発車 → 移動へ
    if(r.phase==='stop' && r.pos===G.trip.to && !r.flags.over){
      // 目的の駅で降りそこねた
      r.flags.over=true;
    }
    r.phase='moving'; r.t=2000;
    const next=r.pos+d;
    const stops = r.type==='local'||EXP_STOPS.has(next);
    sndChime();
    setAnnounce(stops
      ? `🔊 つぎは <b>${rb(next)}</b>、${rb(next)} です`
      : `🔊 ${rb(next)}<ruby>駅<rt>えき</rt></ruby>には とまりません（<ruby>通過<rt>つうか</rt></ruby>）`);
    $('#btn-alight').disabled=true;
  } else if(r.phase==='moving'){
    r.pos+=d; G.clock+=2;
    renderRoute();
    if(!r.dirChecked){
      r.dirChecked=true;
      if(Math.abs(r.pos-G.trip.to) > Math.abs(r.from-G.trip.to)) r.flags.dir=true;
    }
    const stops = r.type==='local'||EXP_STOPS.has(r.pos);
    const terminal = r.pos===0||r.pos===6;
    if(r.type==='exp' && !stops && r.pos===G.trip.to){
      // 目的の駅を急行が通過
      r.flags.type=true;
    }
    if(stops||terminal){
      r.phase='stop'; r.t=6500; G.clock+=0.5;
      sndDoor();
      setAnnounce(`🚉 <b>${rb(r.pos)}</b> です。ドアが ひらきます`);
      $('#btn-alight').disabled=false;
      if(r.flags.dir||r.flags.type||r.flags.over){ forcedAlightModal(); }
      else if(terminal){
        if(r.pos===G.trip.to){
          modal('terminal','🎉',`<ruby>終点<rt>しゅうてん</rt></ruby>、${rb(r.pos)}です。とうちゃく！`,'おりる',()=>alightAt(r.pos));
        } else {
          modal('terminal','🚏',`ここは <ruby>終点<rt>しゅうてん</rt></ruby>の ${rb(r.pos)}です。<br>いったん おりましょう。`,'おりる',()=>alightAt(r.pos));
        }
      }
    } else {
      r.phase='pass'; r.t=1000;
      setAnnounce(`💨 ${rb(r.pos)}を <ruby>通過<rt>つうか</rt></ruby>…`);
      $('#btn-alight').disabled=true;
    }
  }
}
/* エラー分岐：まず「まちがえたこと／まだ着いていません」を表示 → ボタン操作 → 「次の電車に乗れます」の2段階 */
function forcedAlightModal(){
  const r=G.ride; sndSoft();
  let msg1, counterFn;
  if(r.flags.dir){
    counterFn=()=>{G.counters.dir++;};
    msg1=`❌ <ruby>反対<rt>はんたい</rt></ruby><ruby>方向<rt>ほうこう</rt></ruby>の でんしゃに のってしまったよ。<br>`+
         `😯 ${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>には まだ ついていません。`;
  } else if(r.flags.type){
    counterFn=()=>{G.counters.type++;};
    msg1=`❌ ${typeRb('exp')}に のったので、${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>で とまれなかったよ。<br>`+
         `😯 ${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>には まだ ついていません。`;
  } else {
    counterFn=()=>{G.counters.over++;};
    msg1=`❌ おりるのを わすれて、${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>を <ruby>過<rt>す</rt></ruby>ぎてしまったよ。<br>`+
         `😯 ${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>には まだ ついていません。`;
  }
  r.flags.dir=false; r.flags.type=false; r.flags.over=false;
  modal('notYet','😲', msg1, 'つぎは どうする？', ()=>{
    counterFn();
    sndSoft();
    modal('canBoard','🚃',
      `だいじょうぶ！ ${rb(G.ride.pos)}<ruby>駅<rt>えき</rt></ruby>で おりて、<br>`+
      `つぎの でんしゃに のれば ${rb(G.trip.to)}<ruby>駅<rt>えき</rt></ruby>まで いけるよ。`,
      'ここで おりる', ()=>alightAt(G.ride.pos));
  });
}
$('#btn-alight').addEventListener('click',()=>{
  const r=G.ride;
  if(!r||r.phase!=='stop'||G.modalOpen) return;
  sndDoor();
  alightAt(r.pos);
});
function alightAt(s){
  G.curSta=s; G.ride=null; G.clock+=0.5;
  if(s===G.trip.to){
    sndGood();
    if(G.trip.phase==='out') showErrand();
    else showResult();
  } else {
    showTT({isRescue:true, fromPlatform:false});   // 救済フロー：同じ時刻表UIを再利用
  }
}

/* ============ 用事 ============ */
function showErrand(){
  G.state='ERRAND';
  G.errand={timer:5000, total:5000, done:false};
  $('#errand-banner').innerHTML=`🎉 ${rb(G.dest)}<ruby>駅<rt>えき</rt></ruby>に とうちゃく！ おかいものを しよう。`;
  $('#errand-bar').style.width='0%';
  $('#errand-note').textContent='ようじを すませています…';
  $('#errand-art').textContent='🛍️';
  $('#btn-errand-done').style.display='none';
  show('s-errand');
  updateHdr();
}
const ERRAND_ARTS=['🛍️','🍞','📚','🧃','🎁'];
function tickErrand(dt){
  const e=G.errand; if(e.done) return;
  e.timer-=dt;
  const p=1-Math.max(0,e.timer)/e.total;
  $('#errand-bar').style.width=(p*100)+'%';
  $('#errand-art').textContent=ERRAND_ARTS[Math.min(ERRAND_ARTS.length-1,Math.floor(p*ERRAND_ARTS.length))];
  if(e.timer<=0){
    e.done=true;
    G.clock+=30;  // ゲーム内30分経過
    if(G.mode==='normal'){
      sndChime();
      modal('gohome','🕒',
        `30<ruby>分<rt>ぷん</rt></ruby> たちました。そろそろ <ruby>帰<rt>かえ</rt></ruby>りましょう。<br><ruby>帰<rt>かえ</rt></ruby>りの <ruby>時刻表<rt>じこくひょう</rt></ruby>を <ruby>見<rt>み</rt></ruby>てみよう。`,
        '時刻表を見る', startReturn);
    } else {
      $('#errand-note').textContent='ようじが おわりました！';
      $('#btn-errand-done').style.display='';
      sndGood();
    }
  }
}
$('#btn-errand-done').addEventListener('click',startReturn);
function startReturn(){
  G.trip={phase:'back', to:HOME};
  showTT({isRescue:false, fromPlatform:false});
}

/* ============ リザルト ============ */
function showResult(){
  G.state='RESULT';
  const c=G.counters;
  const errs=c.miss+c.over+c.type+c.dir;
  const elapsed=Math.round(G.clock-G.startClock);
  const title = errs===0 ? '🥇 でんしゃマスター！'
              : errs<=2 ? '🥈 りっぱな のりもの<ruby>名人<rt>めいじん</rt></ruby>'
              : '🥉 あきらめない チャレンジャー！';
  const cmt = errs===0 ? 'かんぺき！ ひとりで でんしゃに のれたね！'
            : 'しっぱいしても さいごまで たどりつけたのが すごい！';
  $('#title-badge').innerHTML=title;
  $('#result-table').innerHTML=
    `<tr><td>のりすごし（のりそこね）</td><td>${c.miss} かい</td></tr>`+
    `<tr><td>おりわすれ</td><td>${c.over} かい</td></tr>`+
    (G.mode==='real'?`<tr><td>${typeRb('exp')}の のりまちがい</td><td>${c.type} かい</td></tr>`+
    `<tr><td><ruby>方向<rt>ほうこう</rt></ruby>の のりまちがい</td><td>${c.dir} かい</td></tr>`:'')+
    `<tr><td>かかった <ruby>時間<rt>じかん</rt></ruby></td><td>${Math.floor(elapsed/60)}じかん${elapsed%60}ぷん</td></tr>`+
    `<tr><td colspan="2" style="text-align:center">${cmt}</td></tr>`;
  sndGood();
  show('s-result');
  updateHdr();
}
$('#btn-again').addEventListener('click',()=>location.reload());

/* ============ メインループ ============ */
let last=performance.now();
setInterval(()=>{
  const now=performance.now();
  let dt=(now-last)*TS; last=now;
  dt=Math.min(dt, 2000*TS);
  if(!G.modalOpen){
    if(G.state==='PLATFORM') tickPlatform(dt);
    else if(G.state==='RIDE') tickRide(dt);
    else if(G.state==='ERRAND') tickErrand(dt);
  }
  updateHdr();
},50);

/* ダブルタップズーム防止 */
let lastTouch=0;
document.addEventListener('touchend',e=>{
  const t=Date.now();
  if(t-lastTouch<350) e.preventDefault();
  lastTouch=t;
},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());
</script>
</body>
